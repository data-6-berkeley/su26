#######################################################
# Config you will need to change once per semester    #
#######################################################

# Set start_date to the Monday of the first week of instruction.
# Set end_date to the Friday of exams week.
start_date: 2026-07-06
end_date: 2026-08-14

# Any other days you want to appear on the calendar (e.g. for one-time events
# like exams or bonus lectures) can be listed here. These appear in the second column.
extra_days_col2:
  - date: 2026-08-14
    title: Final Exam
    label: exam

# The dates used in extra_links_col3 below must already be included on the calendar 
# Use this to provide extra links in the third (reading) column
extra_links_col3:
  - date: 2026-07-06
    title: Pre-Semester Survey (due 7/10)
    label: survey
  #   link: https://datahub.berkeley.edu/hub/login?next=%2Fhub%2F
  - date: 2026-07-10
    title: Survey 1 (due 7/17)
    label: survey
  - date: 2026-07-17
    title: Survey 2(due 7/24)
    label: survey
  - date: 2026-07-24
    title: Survey 3 (due 7/31)
    label: survey
  - date: 2026-07-31
    title: Survey 4 (due 8/7)
    label: survey
  - date: 2026-08-07
    title: Survey 5 (due 8/12)
    label: survey

# The days of the week we have class on. Ranges from Sunday = 0 and Saturday = 6.
# For example, for a semester with Tu/Th lectures, put ['2', '4'].
# For example, for a semester with MWF lectures, put ['1', '3', '5'].
# For example, for a summer semester, put ['1', '2', '3', '4'].
class_days: ['1', '2', '3', '4']
discussion_days: ['5']
lab_days: ['2', '4']
hw_days: ['2', '4']
hw_due_days: ['3', '5']
quiz_days: ['3']

# Where should we start automatically numbering each course component?
# For example, if you set starting_homework_number to 0, then the first homework
# assignment you create is numbered HW0. If you set it to 1, then that same
# assignment is numbered HW1 instead.
# You may not need all of these. 
starting_lecture_number: '1'
starting_discussion_number: '0'
starting_homework_number: '1'
starting_lab_number: '1'
starting_project_number: '1'
starting_quiz_number: '1'
# Is the first week of class Week 0 or Week 1? We currently don't support
# starting at any other week number, so pick '0' or '1' here.
starting_week_number: '1'

# Fefine the width of each column in the schedule
date_width: "12%"
col2_width: "55%"
col3_width: "33%" 